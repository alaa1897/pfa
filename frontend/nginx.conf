# ─────────────────────────────────────────────────────────────────────────────
# Nginx Configuration
# ─────────────────────────────────────────────────────────────────────────────
#
# This config does three things:
#   1. Serves the React SPA (Single Page Application)
#   2. Proxies all /api/* and /ws/* requests to the Django backend
#   3. Handles SPA routing (React Router) — unknown paths return index.html
#
# In Kubernetes, this container sits behind an Ingress controller.
# In development (docker-compose), it's accessed directly on port 80.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Root directory for the built React app
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression for faster transfers
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Static files (React build output) ────────────────────────────────────
    # Cache aggressively — React generates hashed filenames for cache-busting
    location ^~ /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
}
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy → Django backend ────────────────────────────────────────────
    # All requests to /api/* and /admin/* are forwarded to the backend service.
    # In docker-compose, "backend" is the service name (Docker DNS resolves it).
    # In Kubernetes, it would be the backend Service ClusterIP or DNS name.
    location ~ ^/(api|admin)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for file uploads
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        # Max upload size for ad creatives (50 MB)
        client_max_body_size 50M;
    }

    # ── WebSocket proxy → Django Channels ────────────────────────────────────
    # WebSocket connections need special headers to upgrade the HTTP connection.
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        # These two headers are required for WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Keep WebSocket connections alive longer (boards stay connected)
        proxy_read_timeout 86400s;
    }

    # ── Media files (uploaded ads) ────────────────────────────────────────────

    # ── SPA routing ───────────────────────────────────────────────────────────
    # For any route that doesn't match a static file or API call,
    # return index.html so React Router can handle the navigation client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
