# ─────────────────────────────────────────────────────────────────────────────
# Frontend Deployment — React + Nginx
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: dooh
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: YOUR_ECR_REGISTRY/dooh-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20

---

apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: dooh
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80

---
# ─────────────────────────────────────────────────────────────────────────────
# Ingress — AWS ALB (Application Load Balancer)
# ─────────────────────────────────────────────────────────────────────────────
#
# The Ingress is the single entry point from the internet into the cluster.
# It uses the AWS Load Balancer Controller to provision an ALB automatically.
#
# Traffic flow:
#   Internet → ALB → Ingress → frontend-service (Nginx)
#                             → backend-service  (for /api/*, /ws/*)
#
# WebSocket note:
#   The ALB supports WebSocket natively. The `alb.ingress.kubernetes.io/
#   target-type: ip` annotation is important for WebSocket connections —
#   it routes directly to pod IPs, avoiding an extra hop through kube-proxy.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dooh-ingress
  namespace: dooh
  annotations:
    # Use the AWS ALB Ingress Controller
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

    # HTTPS — reference your ACM certificate ARN here
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:...
    # alb.ingress.kubernetes.io/ssl-redirect: "443"

    # Health check path for ALB target groups
    alb.ingress.kubernetes.io/healthcheck-path: /
spec:
  rules:
    - host: dooh-platform.example.com   # Replace with your domain
      http:
        paths:
          # API and WebSocket → backend directly (bypasses Nginx)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          - path: /media
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          # Everything else → React frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
