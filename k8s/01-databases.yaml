# ─────────────────────────────────────────────────────────────────────────────
# PostgreSQL — StatefulSet + PersistentVolumeClaim + Service
# ─────────────────────────────────────────────────────────────────────────────
#
# Why StatefulSet instead of Deployment for databases?
#   StatefulSets give each pod a stable network identity and stable storage.
#   Databases need this — a Deployment pod could be rescheduled to a different
#   node and lose its data. A StatefulSet's PVC follows the pod.
#
# In production on AWS, consider using RDS (managed PostgreSQL) instead of
# running Postgres in Kubernetes. RDS handles backups, failover, and patching.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: dooh
spec:
  serviceName: "postgres-service"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: dooh-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: dooh-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dooh-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "dooh_user"]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "gp2"       # AWS EBS gp2 storage class
        resources:
          requests:
            storage: 10Gi

---

# Headless service for StatefulSet + ClusterIP for app access
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: dooh
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None   # Headless — required for StatefulSet DNS

---
# ─────────────────────────────────────────────────────────────────────────────
# Redis — Deployment + Service
# ─────────────────────────────────────────────────────────────────────────────
#
# Redis is used as:
#   1. Celery message broker (task queue)
#   2. Django Channels layer (WebSocket message routing between pods)
#
# In production on AWS, consider ElastiCache (managed Redis) for:
#   - Automatic failover
#   - Cluster mode for horizontal scaling
#   - No maintenance overhead
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: dooh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: dooh
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
